  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Reel — Recommender Explorer (Design Handoff)<\u002Ftitle>\n\n<style>\n  :root {\n    --bg: #0E1117;\n    --panel: #161B22;\n    --text: #E8E8E8;\n    --muted: rgba(255,255,255,.4);\n    --muted2: rgba(255,255,255,.6);\n    --border: rgba(255,255,255,.07);\n    --blue: #40BCF4;\n    --green: #1DB954;\n    --amber: #F59E0B;\n    --red: #E45756;\n    --mono: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: var(--bg); }\n  body {\n    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;\n    color: var(--text);\n    -webkit-font-smoothing: antialiased;\n  }\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 6px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  select option { background: var(--panel); color: var(--text); }\n\n  .app { display: flex; min-height: 100vh; width: 100%; }\n\n  /* ---------- SIDEBAR ---------- */\n  .sidebar {\n    width: 284px; flex: 0 0 284px; background: var(--bg);\n    border-right: 1px solid var(--border);\n    padding: 22px 20px; display: flex; flex-direction: column; gap: 24px;\n    position: sticky; top: 0; align-self: flex-start; height: 100vh; overflow-y: auto;\n  }\n  .brand { display: flex; align-items: center; gap: 11px; }\n  .brand-mark {\n    width: 32px; height: 32px; border-radius: 8px; background: var(--blue);\n    display: flex; align-items: center; justify-content: center; flex: 0 0 auto;\n  }\n  .brand-mark .play {\n    width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent;\n    border-left: 10px solid var(--bg); margin-left: 3px;\n  }\n  .brand-name { font-size: 16px; font-weight: 700; letter-spacing: .3px; line-height: 1.15; }\n  .brand-sub { font-size: 11px; color: var(--muted); }\n\n  .field { display: flex; flex-direction: column; gap: 8px; }\n  .label {\n    font-size: 11px; font-weight: 600; letter-spacing: .6px;\n    text-transform: uppercase; color: var(--muted);\n  }\n  .select-wrap { position: relative; }\n  .select-wrap select {\n    appearance: none; -webkit-appearance: none; width: 100%;\n    padding: 10px 32px 10px 12px; background: var(--panel); color: var(--text);\n    border: 1px solid rgba(255,255,255,.1); border-radius: 8px;\n    font-size: 14px; font-weight: 500; cursor: pointer; outline: none;\n  }\n  .select-wrap select:focus { border-color: var(--blue); }\n  .select-wrap .chev {\n    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);\n    pointer-events: none; color: var(--muted); font-size: 11px;\n  }\n  .desc-card {\n    margin-top: 4px; padding: 12px 13px; background: var(--panel);\n    border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 8px;\n  }\n  .desc-card p { margin: 0; font-size: 12.5px; line-height: 1.5; color: var(--muted2); }\n\n  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }\n  .slider-val { font-size: 14px; font-weight: 700; color: var(--blue); font-family: var(--mono); }\n  input[type=range] { width: 100%; accent-color: var(--blue); cursor: pointer; }\n\n  .sidebar-foot {\n    font-size: 11px; line-height: 1.6; color: rgba(255,255,255,.3);\n    border-top: 1px solid rgba(255,255,255,.06); padding-top: 16px; margin-top: auto;\n  }\n\n  /* ---------- MAIN ---------- */\n  .main { flex: 1; min-width: 0; }\n  .page-head { padding: 26px 34px 0 34px; }\n  .page-head h1 { margin: 0; font-size: 27px; font-weight: 800; letter-spacing: -.5px; }\n  .page-head .tagline { margin-top: 5px; font-size: 13px; color: var(--muted); font-family: var(--mono); }\n\n  .tabs { display: flex; gap: 24px; margin-top: 20px; border-bottom: 1px solid var(--border); }\n  .tab {\n    padding: 0 0 12px; font-size: 13px; background: none; border: none;\n    border-bottom: 2px solid transparent; color: rgba(255,255,255,.42);\n    font-weight: 500; cursor: pointer; margin-bottom: -1px;\n  }\n  .tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--blue); }\n\n  .explorer {\n    padding: 24px 34px 48px 34px; display: grid;\n    grid-template-columns: 1.55fr 1fr; gap: 26px; align-items: start;\n  }\n  .col { display: flex; flex-direction: column; gap: 18px; min-width: 0; }\n\n  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }\n\n  /* user profile */\n  .profile { display: flex; align-items: center; gap: 16px; padding: 18px; }\n  .avatar {\n    position: relative; width: 54px; height: 54px; border-radius: 14px; overflow: hidden;\n    flex: 0 0 auto; display: flex; align-items: center; justify-content: center;\n    background: hsl(174 45% 22%);\n  }\n  .avatar span { font-weight: 800; font-size: 18px; color: hsl(174 55% 70%); font-family: var(--mono); }\n  .profile-name { font-size: 18px; font-weight: 700; }\n  .profile-stats { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 2px; }\n  .method-badge-wrap { margin-left: auto; flex: 0 0 auto; text-align: right; }\n  .method-badge-label { font-size: 10px; letter-spacing: .5px; text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 4px; }\n  .method-badge {\n    font-size: 12.5px; font-weight: 600; color: var(--blue); background: rgba(64,188,244,.1);\n    border: 1px solid rgba(64,188,244,.25); padding: 5px 11px; border-radius: 7px; white-space: nowrap; display: inline-block;\n  }\n\n  /* taste profile */\n  .panel-pad { padding: 16px 18px; }\n  .panel-title {\n    font-size: 11px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase;\n    color: var(--muted); margin-bottom: 14px;\n  }\n  .taste-row { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }\n  .taste-row:last-child { margin-bottom: 0; }\n  .taste-name { width: 64px; font-size: 12.5px; color: rgba(255,255,255,.7); flex: 0 0 auto; }\n  .bar-track { flex: 1; height: 6px; background: rgba(255,255,255,.07); border-radius: 3px; overflow: hidden; }\n  .bar-fill { height: 100%; border-radius: 3px; background: var(--blue); }\n  .taste-val { width: 34px; text-align: right; font-size: 12px; font-weight: 600; color: var(--muted2); font-family: var(--mono); flex: 0 0 auto; }\n\n  /* recs header */\n  .recs-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 4px; }\n  .recs-head .h { font-size: 16px; font-weight: 700; }\n  .recs-head .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }\n  .seg { display: flex; gap: 3px; background: var(--panel); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 3px; }\n  .seg button {\n    padding: 5px 13px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer;\n    font-weight: 500; color: var(--muted2); background: transparent;\n  }\n  .seg button.active { font-weight: 600; color: var(--bg); background: var(--blue); }\n\n  /* poster (shared) */\n  .poster { position: relative; overflow: hidden; flex: 0 0 auto; background: var(--ph, hsl(210 26% 15%)); }\n  .poster img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }\n  .poster .ph-init {\n    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);\n    font-weight: 700; letter-spacing: 1px; color: var(--pht, hsl(210 38% 60%)); z-index: 0;\n  }\n\n  /* DIRECTION A — list */\n  .rec-list { display: flex; flex-direction: column; gap: 10px; }\n  .rec-row {\n    display: flex; gap: 15px; align-items: center; padding: 13px 15px;\n    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;\n    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;\n  }\n  .rec-row:hover { transform: translateY(
